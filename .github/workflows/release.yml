# Manually triggered release (Actions -> Release -> Run workflow):
#   1. Determines the release version: an explicit override input, or the
#      latest vX.Y.Z tag bumped by `bump` (patch/minor/major). Git tags are
#      the single source of truth — no VERSION file to keep in sync.
#   2. Commits the CHANGELOG heading update (if there's an [Unreleased]
#      section to close out), tags vX.Y.Z, and pushes both.
#   3. Creates the GitHub Release with auto-generated notes.
#   4. Publishes to LuaRocks (requires the LUAROCKS_API_KEY secret).
#
# Everything happens in this one workflow because tags pushed with the
# default GITHUB_TOKEN never trigger other workflows. Steps 2 and 3 are
# idempotent, so "Re-run failed jobs" after a fixable failure (e.g. a
# missing LuaRocks key) picks up where it left off.
name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (blank = bump the latest tag)"
        required: false
        type: string
      bump:
        description: "Version bump (ignored if version is given)"
        required: true
        type: choice
        options: [patch, minor, major]
        default: patch

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine release version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            version="${{ inputs.version }}"
          else
            latest="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -n1)"
            if [ -z "$latest" ]; then
              echo "::error::No existing vX.Y.Z tag found; supply an explicit 'version' input for the first release"
              exit 1
            fi
            IFS=. read -r major minor patch <<< "${latest#v}"
            case "${{ inputs.bump }}" in
              major) version="$((major + 1)).0.0" ;;
              minor) version="$major.$((minor + 1)).0" ;;
              *)     version="$major.$minor.$((patch + 1))" ;;
            esac
          fi
          echo "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$' || {
            echo "::error::'$version' is not a plain semver version (X.Y.Z)"
            exit 1
          }
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit changelog and tag
        run: |
          v="${{ steps.version.outputs.version }}"
          if git rev-parse "v$v" >/dev/null 2>&1; then
            echo "Tag v$v already exists; skipping (re-run)"
            exit 0
          fi
          if grep -q '^## \[Unreleased\]' CHANGELOG.md; then
            sed -i "s/^## \[Unreleased\]/## [Unreleased]\n\n## [$v] - $(date -u +%F)/" CHANGELOG.md
            git add CHANGELOG.md
            git commit -m "chore(release): v$v"
          fi
          git tag -a "v$v" -m "v$v"
          git push origin HEAD:main "v$v"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          v="${{ steps.version.outputs.version }}"
          if gh release view "v$v" >/dev/null 2>&1; then
            echo "Release v$v already exists; skipping (re-run)"
          else
            gh release create "v$v" --title "v$v" --generate-notes --verify-tag
          fi

      - name: Publish to LuaRocks
        uses: nvim-neorocks/luarocks-tag-release@v7
        env:
          LUAROCKS_API_KEY: ${{ secrets.LUAROCKS_API_KEY }}
        with:
          version: ${{ steps.version.outputs.version }}
          copy_directories: |
            compiler
            doc
            ftdetect
            ftplugin
            lsp
            syntax
          detailed_description: |
            Ballerina support for Neovim: syntax highlighting, native LSP
            setup, package-aware format-on-save, auto-indent, debugging via
            nvim-dap, and run/test/build commands with quickfix integration.
